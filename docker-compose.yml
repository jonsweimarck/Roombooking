services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: roombooking
      POSTGRES_USER: roombooking
      POSTGRES_PASSWORD: roombooking
    ports:
      - "5432:5432"
    volumes:
      - roombooking-postgres-data:/var/lib/postgresql/data

volumes:
  roombooking-postgres-data: