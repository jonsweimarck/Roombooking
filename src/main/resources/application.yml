spring:
  application:
    name: roombooking
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:postgresql://localhost:5432/roombooking
    username: roombooking
    password: roombooking
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

roombooking:
  admin:
    # Byt ut i produktion via miljövariabeln - "admin" är bara en bekväm
    # standard för lokal utveckling.
    password: ${ROOMBOOKING_ADMIN_PASSWORD:admin}
