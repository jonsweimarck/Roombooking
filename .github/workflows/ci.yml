name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sätt upp Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Kör enhets-, integrations- och acceptanstester (Cucumber körs via junit-platform-engine).
      - name: Bygg och testa
        run: mvn -B verify

      - name: Publicera testrapporter
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

  publish-image:
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Sätt upp Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Logga in på GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Jib bygger och pushar en OCI-image direkt från Maven - ingen Dockerfile behövs.
      # Används för lokal Docker-körning och som grund för en eventuell andra
      # molnplattform (se README) - inte för deployen till Clever Cloud, som
      # bygger direkt från källkoden med sitt eget Maven-stöd, se nedan.
      - name: Bygg och publicera OCI-image
        env:
          IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: mvn -B compile jib:build

  # Inget deploy-jobb här: Clever Cloud-appen är länkad direkt mot detta
  # GitHub-repo (se README) och bygger + deployar automatiskt vid varje push
  # till master, oberoende av den här workflowen. Se clevercloud/maven.json
  # för hur Clever Cloud vet hur appen ska startas.
